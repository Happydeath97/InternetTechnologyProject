{% extends "base.html" %}
{% load static %}

{% block title %}Create Author | MoviePulse{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/author/author.css' %}">
{% endblock %}

{% block content %}
    <section class="form-page">
        <h1>Create Author</h1>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="form-actions">
                <button type="submit" class="btn">Create</button>
                <a href="{% url 'author_list' %}" class="btn">Cancel</a>
            </div>
        </form>
    </section>
{% endblock %}
