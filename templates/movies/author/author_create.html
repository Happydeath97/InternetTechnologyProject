{% extends "base.html" %}
{% load static %}

{% block title %}Create Author | MoviePulse{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/author/author.css' %}">
{% endblock %}

{% block content %}
    <section class="form-page">
        <h1>Create Author</h1>

        <form id="author-create-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="full_name">Full name</label>
                <input type="text" id="full_name" name="full_name" required>
                <div id="full_name-error" class="form-error"></div>
            </div>
            <div class="form-group">
                <label for="date_of_birth">Birth date</label>
                <input type="date" id="date_of_birth" name="date_of_birth">
                <div id="date_of_birth-error" class="form-error"></div>
            </div>

            <div id="form-error" class="form-error"></div>

            <div class="form-actions">
                <button type="submit" class="btn">Create</button>
                <a href="{% url 'author_list' %}" class="btn">Cancel</a>
            </div>
        </form>
    </section>
{% endblock %}
{% block extra_js %}
    <script src="{% static 'js/movies/author/author_create.js' %}"></script>
{% endblock %}
