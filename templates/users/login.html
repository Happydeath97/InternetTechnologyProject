{% extends 'base.html' %}

{% block title %}Login | MoviePulse{% endblock %}

{% block content %}
    <section>
        <h1>Login</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>

        <p><a href="{% url 'register' %}">Create account</a></p>
    </section>
{% endblock %}
